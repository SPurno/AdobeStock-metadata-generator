<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adobe Stock Metadata Generator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="8" fill="#1473E6"/>
            <path d="M8 34 L16 20 L24 28 L32 14 L40 34 Z" fill="white" opacity="0.9"/>
            <circle cx="15" cy="13" r="3.5" fill="white" opacity="0.9"/>
          </svg>
        </div>
        <div>
          <div class="title">Metadata Generator</div>
          <div class="subtitle">Adobe Stock</div>
        </div>
      </div>
      <div class="status-indicator" id="status-indicator">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">Initializing</span>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="section">
      <div class="section-title">Quick Actions</div>
      <div class="action-grid">
        <button class="action-btn" id="btn-analyze">
          <div class="action-icon">🔍</div>
          <div class="action-label">Analyze Image</div>
        </button>
        <button class="action-btn" id="btn-generate">
          <div class="action-icon">✨</div>
          <div class="action-label">Generate Metadata</div>
        </button>
        <button class="action-btn" id="btn-bulk">
          <div class="action-icon">☑</div>
          <div class="action-label">Bulk Mode</div>
        </button>
        <button class="action-btn" id="btn-panel">
          <div class="action-icon">📊</div>
          <div class="action-label">Show Panel</div>
        </button>
      </div>
    </div>

    <!-- Settings -->
    <div class="section">
      <div class="section-title">
        Settings
        <span class="toggle-arrow" id="settings-toggle">▼</span>
      </div>
      <div class="settings-group" id="settings-group">
        <label class="setting">
          <span class="setting-label">
            <span class="setting-icon">📝</span>
            Auto-generate Title
          </span>
          <div class="toggle">
            <input type="checkbox" id="setting-title" checked>
            <span class="slider"></span>
          </div>
        </label>

        <label class="setting">
          <span class="setting-label">
            <span class="setting-icon">🔑</span>
            Auto-generate Keywords
          </span>
          <div class="toggle">
            <input type="checkbox" id="setting-keywords" checked>
            <span class="slider"></span>
          </div>
        </label>

        <label class="setting">
          <span class="setting-label">
            <span class="setting-icon">🏷️</span>
            Auto-select Category
          </span>
          <div class="toggle">
            <input type="checkbox" id="setting-category" checked>
            <span class="slider"></span>
          </div>
        </label>

        <label class="setting">
          <span class="setting-label">
            <span class="setting-icon">☑</span>
            Enable Bulk Selection
          </span>
          <div class="toggle">
            <input type="checkbox" id="setting-bulk" checked>
            <span class="slider"></span>
          </div>
        </label>

        <div class="setting">
          <span class="setting-label">
            <span class="setting-icon">🔢</span>
            Keyword Count
          </span>
          <div class="input-group">
            <input type="number" id="setting-keyword-count" value="47" min="5" max="50" class="num-input">
            <span class="num-hint">max 50</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Engine Status -->
    <div class="section">
      <div class="section-title">Engine Status</div>
      <div class="engine-status" id="engine-status">
        <div class="engine-item">
          <span class="engine-label">TensorFlow.js</span>
          <span class="engine-check" id="tf-status">⏳ Loading...</span>
        </div>
        <div class="engine-item">
          <span class="engine-label">MobileNet Model</span>
          <span class="engine-check" id="model-status">⏳ Loading...</span>
        </div>
        <div class="engine-item">
          <span class="engine-label">Page Connection</span>
          <span class="engine-check" id="page-status">⏳ Checking...</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>v1.0.0</span>
      <a href="#" id="open-settings-link">Settings</a>
      <a href="#" id="help-link">Help</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
